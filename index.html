<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚾ 야구 기본 룰 가이드</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;
  --bg2:#161b22;
  --bg3:#1c2333;
  --card:#1c2333;
  --card2:#21283a;
  --border:#2a3547;
  --border2:#3d5278;
  --text:#e6edf3;
  --text2:#8b949e;
  --text3:#484f58;
  --gold:#e3a525;
  --gold-dim:#7a5510;
  --gold-bg:rgba(227,165,37,0.1);
  --green:#2ea043;
  --green-bright:#56d364;
  --green-bg:rgba(46,160,67,0.12);
  --green-field:#1a3a1a;
  --green-grass:#2d6a2d;
  --green-grass2:#245224;
  --dirt:#5c3a1e;
  --dirt2:#7a5030;
  --blue:#388bfd;
  --blue-bg:rgba(56,139,253,0.12);
  --red:#f85149;
  --red-bg:rgba(248,81,73,0.12);
  --amber:#e3a525;
  --amber-bg:rgba(227,165,37,0.12);
  --white-base:#dde5f0;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;
}
body{
  background:var(--bg);
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  color:var(--text);
  min-height:100vh;
  padding:28px 16px 60px;
}
/* ── 헤더 ── */
.wrap{max-width:760px;margin:0 auto}
.hdr{text-align:center;margin-bottom:32px;position:relative}
.hdr-stadium{
  width:100%;max-width:500px;margin:0 auto 18px;
  display:block;
}
.hdr h1{
  font-size:26px;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(135deg,#e3a525 0%,#f5d07a 50%,#e3a525 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:6px;
}
.hdr p{font-size:13px;color:var(--text2)}

/* ── 네비게이션 ── */
.nav{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.nb{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:13px 8px;cursor:pointer;text-align:center;
  transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  position:relative;overflow:hidden;
}
.nb::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 60%,rgba(227,165,37,0.04));
  pointer-events:none;
}
.nb:hover{border-color:var(--border2);background:var(--card2);transform:translateY(-1px)}
.nb.on{
  border:1.5px solid var(--gold);
  background:linear-gradient(135deg,rgba(227,165,37,0.15),rgba(227,165,37,0.05));
  box-shadow:0 0 16px rgba(227,165,37,0.15);
}
.nb-icon{font-size:20px;line-height:1}
.nb-label{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.3px}
.nb.on .nb-label{color:var(--gold)}

/* ── 룰 카드 ── */
.rules{display:flex;flex-direction:column;gap:8px}
.rc{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.rc.open{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.rt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s}
.rt:hover{background:var(--card2)}
.ri{font-size:20px;min-width:28px;text-align:center;margin-top:1px;filter:drop-shadow(0 0 4px rgba(227,165,37,0.3))}
.rinfo{flex:1}
.rtitle{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px}
.rdesc{font-size:12px;color:var(--text2);line-height:1.6}
.badge{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:700;white-space:nowrap;letter-spacing:0.3px}
.badge-b{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(56,139,253,0.3)}
.badge-g{background:var(--green-bg);color:var(--green-bright);border:1px solid rgba(86,211,100,0.3)}
.badge-a{background:var(--amber-bg);color:var(--gold);border:1px solid rgba(227,165,37,0.3)}
.badge-r{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,81,73,0.3)}
.chev{font-size:16px;color:var(--text3);transition:transform .3s;flex-shrink:0;margin-top:3px}
.rc.open .chev{transform:rotate(180deg);color:var(--gold)}

/* ── 비주얼 영역 ── */
.vz{border-top:1px solid var(--border);background:var(--bg2);max-height:0;overflow:hidden;transition:max-height .4s ease}
.rc.open .vz{max-height:520px}
.vz-inner{padding:16px}
svg.vizsvg{width:100%;display:block}

/* ── 야구장 공통 스타일 ── */
.field-bg{fill:#0a1a0a}
.grass-outer{fill:#1e4a1e}
.grass-inner{fill:#245224}
.grass-stripe{fill:none;stroke:#2a5c2a;stroke-width:8;opacity:0.5}
.dirt-infield{fill:#3d2410}
.dirt-track{fill:none;stroke:#4a2e14;stroke-width:18;opacity:0.6}
.foul-line{stroke:#ffffffaa;stroke-width:1.2}
.base-white{fill:#f0f0f0;stroke:#cccccc;stroke-width:1}
.home-plate{fill:#f0f0f0;stroke:#cccccc;stroke-width:1}
.base-highlight{fill:none;stroke:#ffffff;stroke-width:0.5;opacity:0.4}
.pitcher-mound{fill:#4a2e14;stroke:#3d2410;stroke-width:1}
.warning-track{fill:none;stroke:#6b4423;stroke-width:12;opacity:0.4}
.outfield-wall{stroke:#1a3a8f;stroke-width:5;fill:none;opacity:0.7}

/* ── 선수 실루엣 색상 ── */
.player-blue{fill:#388bfd;filter:drop-shadow(0 0 5px rgba(56,139,253,0.6))}
.player-green{fill:#2ea043;filter:drop-shadow(0 0 5px rgba(46,160,67,0.6))}
.player-orange{fill:#e3a525;filter:drop-shadow(0 0 5px rgba(227,165,37,0.6))}
.player-red{fill:#f85149;filter:drop-shadow(0 0 5px rgba(248,81,73,0.4))}
.player-teal{fill:#3fb950;filter:drop-shadow(0 0 5px rgba(63,185,80,0.5))}
.ball-glow{filter:drop-shadow(0 0 4px #e3a525)}
.ball-trail{stroke:#e3a52580;stroke-width:1.5;fill:none;stroke-dasharray:4 3}

/* ── 애니메이션 ── */
/* 투구 */
@keyframes pitchBall    {0%,5%{cy:222px;r:5px}45%{cy:108px;r:4px}100%{cy:108px;r:4px}}
@keyframes strikeFlash  {0%,44%{opacity:0}55%,80%{opacity:1}90%,100%{opacity:0}}

/* 득점 */
@keyframes scoreRun     {0%,5%{cx:185px;cy:170px}70%{cx:310px;cy:250px}100%{cx:310px;cy:250px}}
@keyframes scoreFlash   {0%,65%{opacity:0}75%,92%{opacity:1}100%{opacity:0}}

/* 홈런 */
@keyframes hrBallFade  {0%,5%{opacity:1}75%{opacity:1}90%{opacity:0}100%{opacity:0}}
@keyframes hrRunnerRun {0%,5%{cx:260px;cy:228px}100%{cx:310px;cy:250px}}

/* ── 포스아웃 (5.5초 사이클) ──
   상황: 1루 주자 있음. 타자가 내야 땅볼 → 유격수가 잡아 2루로 송구
         1루 주자가 2루로 뛰지만 공이 먼저 → 2루에서 포스아웃
   0~10%  : 정지 (1루 주자 대기, 타자 대기)
   10~28% : 타자가 치고 유격수 쪽으로 공 굴러감
   28~50% : 유격수가 잡아 2루로 송구 (공: 유격수→2루)
   30~68% : 1루 주자가 2루로 달림 (공보다 느림)
   50~65% : 공이 2루 베이스에 먼저 도착 → 2루 flash
   65~82% : 포스아웃 텍스트
   82~100%: 유지 후 리셋
*/
/* 타자: 침 후 1루로 달림 */
@keyframes forceHitXY   {0%,10%{cx:310px;cy:252px}55%{cx:410px;cy:218px}80%{cx:462px;cy:172px}100%{cx:462px;cy:172px}}
/* 공: 홈플레이트 → 유격수 위치(235,140) → 2루(310,58) */
@keyframes forceBallXY  {0%,8%{cx:310px;cy:238px;opacity:1}26%{cx:235px;cy:148px;opacity:1}50%{cx:310px;cy:65px;opacity:1}100%{cx:310px;cy:65px;opacity:1}}
/* 1루 주자: 1루(462,172) → 2루(310,58) — 공보다 느리게 도착 */
@keyframes forceR1XY    {0%,8%{cx:462px;cy:172px}72%{cx:310px;cy:58px}100%{cx:310px;cy:58px}}
/* 포스아웃 레이블 */
@keyframes forceOutLbl  {0%,60%{opacity:0}70%,88%{opacity:1}96%,100%{opacity:0}}
/* 2루 베이스 빨간 flash (공 도착 시) */
@keyframes force2BFlash {0%,45%{fill:#f0f0f0}52%,66%{fill:#f85149}72%,100%{fill:#f0f0f0}}
/* 단계 레이블 */
@keyframes forceStep1   {0%,8%{opacity:0}14%,26%{opacity:1}34%,100%{opacity:0}}
@keyframes forceStep2   {0%,26%{opacity:0}34%,60%{opacity:1}68%,100%{opacity:0}}

/* ── 태그아웃 (6초 사이클) ──
   상황: 3루 주자가 홈으로 달림 → 유격수가 공 잡아 홈 송구 → 포수 태그 → 아웃
   0~8%   : 정지 (3루 주자 대기, 유격수 위치, 포수 홈)
   8~30%  : 3루 주자가 홈으로 달리기 시작
   30~52% : 유격수가 공을 홈으로 송구 (공: 유격수→홈 직선)
   30~68% : 주자 계속 홈으로 질주
   52~68% : 공 포수에게 도착, 포수 태그 준비
   68~82% : 태그아웃 이펙트
   82~100%: 페이드
*/
@keyframes tagRunnerXY  {0%,6%{cx:158px;cy:172px}68%{cx:310px;cy:252px}100%{cx:310px;cy:252px}}
@keyframes tagBallXY    {0%,28%{cx:222px;cy:148px;opacity:0}30%{cx:222px;cy:148px;opacity:1}54%{cx:310px;cy:252px;opacity:1}68%{cx:310px;cy:252px;opacity:0}100%{cx:310px;cy:252px;opacity:0}}
@keyframes tagCatcherXY {0%,50%{cx:310px;cy:252px}56%{cx:310px;cy:245px}100%{cx:310px;cy:245px}}
@keyframes tagGlowAnim  {0%,64%{opacity:0}72%,84%{opacity:1}94%,100%{opacity:0}}
@keyframes tagLblAnim   {0%,66%{opacity:0}74%,86%{opacity:1}96%,100%{opacity:0}}
@keyframes tagStep1     {0%,5%{opacity:0}10%,28%{opacity:1}36%,100%{opacity:0}}
@keyframes tagStep2     {0%,28%{opacity:0}36%,62%{opacity:1}70%,100%{opacity:0}}

/* ── 도루 (7초 사이클) ──
   리드 위치: 1루(462,172)→2루(310,58) 라인 위, 약 20px 나온 (443,165)
   0~8%   : 정지 (리드 위치 대기)
   8~32%  : 투수 홈 투구 / 주자 동시 질주 시작
   31~32% : 공 홈 도착 (포수 수령) → 즉시 2루 송구
   32~72% : 포수 송구공 홈→2루 / 주자도 전력 질주
   70%    : 주자 2루 도착 (아슬하게 먼저)
   72%    : 공도 2루 도착 (바로 직후)
   72~90% : 세이프 이펙트
*/
@keyframes stealPitchXY {
  0%,6%  {cx:310px;cy:165px;opacity:1}
  31%    {cx:310px;cy:252px;opacity:1}
  32%    {cx:310px;cy:252px;opacity:0}
  100%   {cx:310px;cy:252px;opacity:0}
}
/* 포수 수령 즉시 2루 송구: 31%에 홈 등장, 바로 달려감 */
@keyframes stealThrowXY {
  0%,30%  {cx:310px;cy:252px;opacity:0}
  31%     {cx:310px;cy:252px;opacity:1}
  74%     {cx:310px;cy:58px;opacity:1}
  82%     {cx:310px;cy:58px;opacity:0}
  100%    {cx:310px;cy:58px;opacity:0}
}
/* 주자: 리드(443,165) → 2루(310,58), 공보다 딱 2프레임 먼저 */
@keyframes stealRunXY {
  0%,6%  {cx:443px;cy:165px}
  70%    {cx:310px;cy:58px}
  100%   {cx:310px;cy:58px}
}
@keyframes stealSafeGlow {
  0%,68%  {opacity:0;r:8px}
  76%,88% {opacity:1;r:24px}
  96%,100%{opacity:0;r:28px}
}
@keyframes stealLblXY {0%,70%{opacity:0}78%,92%{opacity:1}98%,100%{opacity:0}}

/* ── 태그업 (8초 사이클) ──
   상황: 뜬공→외야수 캐치→즉시 홈 송구 / 3루 주자 태그업→홈 질주→주자 먼저 도착→득점
   외야수 위치: 우익수(430,72)
   0~8%   : 3루 주자 베이스 대기, "대기중" 표시
   8~38%  : 뜬공 타자→우익수 방향 포물선
   38~40% : 외야수 캐치 이펙트
   40~42% : 즉시 홈으로 송구 시작 (공: 430,72 → 310,252)
   52~55% : 주자 태그업 출발 (3루→홈 질주)
   40~78% : 외야수 송구공 홈으로 날아옴
   52~75% : 주자 홈으로 질주
   73%    : 주자 홈 도착 (먼저!)
   78%    : 공 홈 도착 (늦게)
   73~92% : +1점! 세이프 이펙트
*/
/* 뜬공: 타자→우익수 포물선 */
@keyframes tagupBallXY  {
  0%,6%  {cx:310px;cy:235px;opacity:1}
  35%    {cx:430px;cy:65px;opacity:1}
  40%    {cx:430px;cy:65px;opacity:0}
  100%   {cx:430px;cy:65px;opacity:0}
}
/* 외야수 캐치 링 */
@keyframes tagupCatchFX {
  0%,36%  {opacity:0;r:6px}
  40%,50% {opacity:1;r:22px}
  58%,100%{opacity:0;r:26px}
}
/* 외야수→홈 송구공: 잡자마자 즉시 출발 */
@keyframes tagupThrowXY {
  0%,38%  {cx:430px;cy:72px;opacity:0}
  40%     {cx:430px;cy:72px;opacity:1}
  80%     {cx:310px;cy:252px;opacity:1}
  84%     {cx:310px;cy:252px;opacity:0}
  100%    {cx:310px;cy:252px;opacity:0}
}
/* 주자: 잡힌 순간(40%) 이후 태그업 출발, 홈(73%)에 먼저 도착 */
@keyframes tagupRunXY   {
  0%,50%  {cx:158px;cy:172px}
  73%     {cx:310px;cy:252px}
  100%    {cx:310px;cy:252px}
}
/* 태그업! GO 레이블 */
@keyframes tagupGo      {0%,38%{opacity:0}46%,60%{opacity:1}68%,100%{opacity:0}}
/* 대기 표시 */
@keyframes tagupWait    {0%,8%{opacity:1}40%{opacity:1}46%{opacity:0}100%{opacity:0}}
/* 홈 도착 세이프 이펙트 */
@keyframes tagupSafeGlow {
  0%,70%  {opacity:0;r:8px}
  76%,88% {opacity:1;r:26px}
  96%,100%{opacity:0;r:30px}
}
/* +1점 */
@keyframes tagupScore   {0%,72%{opacity:0}78%,92%{opacity:1}98%,100%{opacity:0}}

/* 보크 */
@keyframes balkJerk  {0%,100%{transform:rotate(0deg)}25%{transform:rotate(-12deg)}50%{transform:rotate(9deg)}75%{transform:rotate(-5deg)}}
/* 3루 주자(158,172) → 홈(310,252) */
@keyframes balkR3toH {0%,25%{cx:158px;cy:172px}80%{cx:310px;cy:252px}100%{cx:310px;cy:252px}}
/* 1루 주자(462,172) → 2루(310,58) */
@keyframes balkR1to2 {0%,25%{cx:462px;cy:172px}80%{cx:310px;cy:58px}100%{cx:310px;cy:58px}}
@keyframes balkLabel {0%,20%{opacity:0}32%,78%{opacity:1}90%,100%{opacity:0}}

/* 번트 (7초 사이클)
   번트공: 홈→3루 방향으로 천천히 굴러감
   3루수→1루 송구: 잡자마자 즉시
   1루 주자: 2루로 진루
   타자: 1루 도착 전 아웃
*/
/* 번트공: 홈(310,252) → 3루(158,172) 방향으로 천천히 굴러감 */
@keyframes buntBall {
  0%,6%   {cx:310px;cy:240px;opacity:1}
  35%     {cx:200px;cy:200px;opacity:1}
  44%     {cx:175px;cy:185px;opacity:1}
  46%     {cx:175px;cy:185px;opacity:0}
  100%    {cx:175px;cy:185px;opacity:0}
}
/* 3루수 catch 이펙트 */
@keyframes buntCatch {
  0%,40%  {opacity:0;r:6px}
  46%,55% {opacity:1;r:20px}
  62%,100%{opacity:0;r:24px}
}
/* 3루수→1루 송구공 */
@keyframes buntThrow {
  0%,44%  {cx:175px;cy:185px;opacity:0}
  46%     {cx:175px;cy:185px;opacity:1}
  72%     {cx:462px;cy:172px;opacity:1}
  76%     {cx:462px;cy:172px;opacity:0}
  100%    {cx:462px;cy:172px;opacity:0}
}
/* 1루 주자: 1루(462,172) → 2루(310,58) */
@keyframes buntR1to2 {
  0%,6%   {cx:462px;cy:172px}
  72%     {cx:310px;cy:58px}
  100%    {cx:310px;cy:58px}
}
/* 타자: 홈(310,252) → 1루(462,172) 달림 (공보다 늦게) */
@keyframes buntBatter {
  0%,6%   {cx:310px;cy:252px}
  75%     {cx:462px;cy:172px}
  100%    {cx:462px;cy:172px}
}
/* 1루 아웃 이펙트 */
@keyframes buntOutFlash {
  0%,68%  {opacity:0;r:8px}
  74%,84% {opacity:1;r:22px}
  92%,100%{opacity:0;r:26px}
}
@keyframes buntLabel {0%,70%{opacity:0}76%,88%{opacity:1}96%,100%{opacity:0}}
/* 1루 베이스 flash */
@keyframes bunt1BFlash {
  0%,68%  {fill:#f0f0f0}
  72%,82% {fill:#f85149}
  88%,100%{fill:#f0f0f0}
}

/* 인필드플라이 */
@keyframes inflyUp      {0%,5%{cx:310px;cy:232px;r:5px}35%{cx:298px;cy:78px;r:5px}62%{cx:295px;cy:78px;r:5px}88%{cx:292px;cy:160px;r:5px}100%{cx:292px;cy:160px;r:5px}}
@keyframes inflyLabel   {0%,30%{opacity:0}42%,76%{opacity:1}88%,100%{opacity:0}}

/* 공통 클래스 연결 */
.anim .pitch-b    {animation:pitchBall 3s ease-in-out infinite}
.anim .strike-t   {animation:strikeFlash 3s ease-in-out infinite}
.anim .score-r    {animation:scoreRun 3.5s ease-in-out infinite}
.anim .score-f    {animation:scoreFlash 3.5s ease-in-out infinite}

/* ══════════════════════════════════
   고급 인터랙션 효과
══════════════════════════════════ */

/* 커서 글로우 */
#cursor-glow {
  position:fixed; pointer-events:none; z-index:9999;
  width:320px; height:320px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(227,165,37,0.07) 0%, transparent 70%);
  transform:translate(-50%,-50%);
  transition:opacity .3s;
  mix-blend-mode:screen;
}
#cursor-dot {
  position:fixed; pointer-events:none; z-index:9999;
  width:8px; height:8px; border-radius:50%;
  background:#e3a525;
  transform:translate(-50%,-50%);
  transition:transform .1s, opacity .3s;
  box-shadow:0 0 12px #e3a525, 0 0 24px #e3a52566;
  mix-blend-mode:screen;
}

/* 파티클 캔버스 */
#particle-canvas {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; z-index:0;
  opacity:0.6;
}

/* wrap이 캔버스 위에 오도록 */
.wrap { position:relative; z-index:1; }

/* 카드 3D tilt */
.nb, .rc {
  transform-style:preserve-3d;
  will-change:transform;
}
.nb {
  transition:transform .15s ease, border-color .2s, box-shadow .2s, background .2s;
}
.nb:hover {
  box-shadow: 0 8px 32px rgba(227,165,37,0.18), 0 2px 8px rgba(0,0,0,0.4);
}
.rc {
  transition:transform .12s ease, border-color .2s, box-shadow .2s;
}
.rc:hover {
  box-shadow:0 6px 28px rgba(56,139,253,0.12), 0 2px 8px rgba(0,0,0,0.3);
}

/* 스크롤 fade-in */
.rc {
  opacity:0;
  transform:translateY(24px);
  transition:opacity .5s ease, transform .5s ease, border-color .2s, box-shadow .2s;
}
.rc.visible {
  opacity:1;
  transform:translateY(0);
}
.rc.open {
  opacity:1 !important;
  transform:none !important;
}

/* 섹션 전환 슬라이드 */
#rules {
  overflow:hidden;
}
.rules-inner {
  transition:opacity .25s ease, transform .28s ease;
}
.rules-inner.exit-left  { opacity:0; transform:translateX(-32px); }
.rules-inner.exit-right { opacity:0; transform:translateX(32px); }
.rules-inner.enter      { opacity:0; transform:translateY(16px); }

/* 네비게이션 탭 언더라인 indicator */
.nb.on::after {
  content:'';
  position:absolute; bottom:0; left:20%; right:20%; height:2px;
  background:var(--gold);
  border-radius:2px;
  animation:tabLine .3s ease forwards;
}
@keyframes tabLine {
  from { transform:scaleX(0); opacity:0; }
  to   { transform:scaleX(1); opacity:1; }
}

/* 헤더 야구장 마우스 시차 */
.hdr-stadium {
  transition:transform .08s linear;
  will-change:transform;
}

/* 룰 카드 열릴때 border glow pulse */
@keyframes borderPulse {
  0%   { box-shadow:0 0 0 0 rgba(56,139,253,0.4); }
  50%  { box-shadow:0 0 0 8px rgba(56,139,253,0); }
  100% { box-shadow:0 0 0 0 rgba(56,139,253,0); }
}
.rc.open { animation:borderPulse .5s ease; }

/* 섹션 버튼 ripple */
.nb-ripple {
  position:absolute; border-radius:50%;
  background:rgba(227,165,37,0.25);
  transform:scale(0); pointer-events:none;
  animation:ripple .5s ease-out forwards;
}
@keyframes ripple {
  to { transform:scale(4); opacity:0; }
}

/* 스크롤바 스타일 */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#0d1117; }
::-webkit-scrollbar-thumb { background:#2a3547; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#3d5278; }
</style>

let cur='overview', openRule=null;

function renderNav(){
  document.getElementById('nav').innerHTML=SECTIONS.map(s=>`
    <button class="nb${s.id===cur?' on':''}" onclick="sw('${s.id}')">
      <span class="nb-icon">${s.icon}</span>
      <span class="nb-label">${s.label}</span>
    </button>`).join('');
}
function renderRules(){
  const sec=SECTIONS.find(s=>s.id===cur);
  openRule=null;
  document.getElementById('rules').innerHTML=sec.rules.map((r,i)=>{
    const rid=`${cur}-${i}`;
    const badge=r.badge?`<span class="badge ${r.badge.cls}">${r.badge.text}</span>`:'';
    return `<div class="rc" id="rc-${rid}">
      <div class="rt" onclick="tog('${rid}','${r.vizId}')">
        <span class="ri">${r.icon}</span>
        <div class="rinfo">
          <div class="rtitle">${r.title}${badge}</div>
          <div class="rdesc">${r.desc}</div>
        </div>
        <span class="chev">▾</span>
      </div>
      <div class="vz" id="vz-${rid}"><div class="vz-inner" id="vi-${rid}"></div></div>
    </div>`;
  }).join('');
}
function sw(id){cur=id;renderNav();renderRules();}
function tog(rid,vizId){
  const rc=document.getElementById('rc-'+rid);
  const vz=document.getElementById('vz-'+rid);
  const vi=document.getElementById('vi-'+rid);
  if(openRule&&openRule!==rid){
    const o=document.getElementById('rc-'+openRule);
    const ov=document.getElementById('vz-'+openRule);
    const oi=document.getElementById('vi-'+openRule);
    if(o)o.classList.remove('open');
    if(ov)ov.classList.remove('anim');
    if(oi)oi.innerHTML='';
  }
  if(rc.classList.contains('open')){
    rc.classList.remove('open');vz.classList.remove('anim');vi.innerHTML='';openRule=null;
  } else {
    vi.innerHTML=VIZS[vizId]||'';
    rc.classList.add('open');
    setTimeout(()=>vz.classList.add('anim'),60);
    openRule=rid;
  }
}
renderNav();renderRules();

/* ── 1. 커서 글로우 추적 ── */
const glow = document.getElementById('cursor-glow');
const dot  = document.getElementById('cursor-dot');
let mx=0, my=0, gx=0, gy=0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  dot.style.left = mx+'px';
  dot.style.top  = my+'px';
});

// 글로우는 부드럽게 lerp 추적
(function lerpGlow(){
  gx += (mx-gx)*0.08;
  gy += (my-gy)*0.08;
  glow.style.left = gx+'px';
  glow.style.top  = gy+'px';
  requestAnimationFrame(lerpGlow);
})();

  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 마우스 위치 (파티클 반응용)
let pmx=W/2, pmy=H/2;
document.addEventListener('mousemove', e=>{ pmx=e.clientX; pmy=e.clientY; });

function mkParticle(){
  const isBall = Math.random()<0.04; // 4%는 야구공 모양
  return {
    x: Math.random()*W,
    y: Math.random()*H,
    r: isBall ? 3.5 : Math.random()*1.4+0.3,
    vx: (Math.random()-0.5)*0.25,
    vy: -Math.random()*0.35-0.1,
    alpha: Math.random()*0.5+0.1,
    isBall,
    color: isBall ? '#f0e8d0' : (Math.random()<0.3 ? '#e3a525' : '#388bfd'),
    twinkle: Math.random()*Math.PI*2,
  };
}

for(let i=0;i<120;i++) particles.push(mkParticle());

function drawBallParticle(p){
  ctx.save();
  ctx.globalAlpha = p.alpha;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
  ctx.fillStyle = '#f0e8d0';
  ctx.fill();
  ctx.strokeStyle = '#c8a87888';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  // 야구 실밥 (간단히 두 호)
  ctx.beginPath();
  ctx.arc(p.x-0.8, p.y, p.r*0.7, -0.5, 0.5);
  ctx.strokeStyle='#c8705088';
  ctx.lineWidth=0.5;
  ctx.stroke();
  ctx.restore();
}

function animParticles(){
  ctx.clearRect(0,0,W,H);

  const t = Date.now()*0.001;
  particles.forEach((p,i)=>{
    // 마우스 근처 파티클 살짝 밀리기
    const dx = p.x-pmx, dy = p.y-pmy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist<120){
      const force = (120-dist)/120*0.4;
      p.vx += dx/dist*force*0.05;
      p.vy += dy/dist*force*0.05;
    }

    p.x  += p.vx;
    p.y  += p.vy;
    p.vy *= 0.99;
    p.vx *= 0.99;
    p.twinkle += 0.03;

    // 화면 밖 리셋
    if(p.y<-10||p.x<-10||p.x>W+10){
      Object.assign(p, mkParticle());
      p.y = H+5;
    }

    const flicker = p.isBall ? 1 : 0.6+Math.sin(p.twinkle)*0.4;
    if(p.isBall){
      drawBallParticle(p);
    } else {
      ctx.save();
      ctx.globalAlpha = p.alpha*flicker;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.color;
      if(p.r>0.8){
        ctx.shadowBlur = 6;
        ctx.shadowColor = p.color;
      }
      ctx.fill();
      ctx.restore();
    }
  });
  requestAnimationFrame(animParticles);
}
animParticles();

} // end if(canvas && ctx)

/* ── 3. 카드 3D Tilt ── */
function applyTilt(el, e){
  const rect = el.getBoundingClientRect();
  const cx = rect.left+rect.width/2;
  const cy = rect.top+rect.height/2;
  const dx = (e.clientX-cx)/(rect.width/2);
  const dy = (e.clientY-cy)/(rect.height/2);
  const tiltX = dy*-6;  // 상하 기울기 (도)
  const tiltY = dx*8;   // 좌우 기울기 (도)
  el.style.transform = `perspective(600px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) translateZ(4px)`;
}
function resetTilt(el){
  el.style.transform = '';
}

// nav 버튼에 tilt
document.addEventListener('mousemove', e=>{
  document.querySelectorAll('.nb').forEach(el=>{
    const r = el.getBoundingClientRect();
    if(e.clientX>r.left&&e.clientX<r.right&&e.clientY>r.top&&e.clientY<r.bottom){
      applyTilt(el,e);
    }
  });
  // rc 카드에 tilt (열리지 않은 것만)
  document.querySelectorAll('.rc:not(.open)').forEach(el=>{
    const r = el.getBoundingClientRect();
    if(e.clientX>r.left&&e.clientX<r.right&&e.clientY>r.top&&e.clientY<r.bottom){
      applyTilt(el,e);
    } else {
      resetTilt(el);
    }
  });
});
document.addEventListener('mouseleave',()=>{
  document.querySelectorAll('.nb,.rc').forEach(el=>resetTilt(el));
});

/* ── 4. nav 버튼 ripple ── */
document.addEventListener('click', e=>{
  const nb = e.target.closest('.nb');
  if(!nb) return;
  const r = nb.getBoundingClientRect();
  const rip = document.createElement('span');
  rip.className='nb-ripple';
  const size = Math.max(r.width,r.height);
  rip.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-r.left-size/2}px;top:${e.clientY-r.top-size/2}px`;
  nb.appendChild(rip);
  setTimeout(()=>rip.remove(),500);
});

/* ── 5. 스크롤 fade-in (IntersectionObserver) ── */
const io = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      // staggered delay
      const idx = [...document.querySelectorAll('.rc')].indexOf(entry.target);
      entry.target.style.transitionDelay = `${idx*60}ms`;
      entry.target.classList.add('visible');
      io.unobserve(entry.target);
    }
  });
},{threshold:0.1});

function observeCards(){
  document.querySelectorAll('.rc').forEach(el=>{
    el.style.transitionDelay='';
    io.observe(el);
  });
}

/* ── 6. 섹션 전환 슬라이드 트랜지션 ── */
const SECTION_ORDER = ['overview','score','pitch','base','field','special'];
let prevSectionIdx = 0;

const origSw = sw;
window.sw = function(id){
  const rulesEl = document.getElementById('rules');
  const curIdx  = SECTION_ORDER.indexOf(id);
  const dir     = curIdx > prevSectionIdx ? 'exit-left' : 'exit-right';

  // 기존 내용 슬라이드 아웃
  const inner = rulesEl.querySelector('.rules-inner') || rulesEl;
  rulesEl.style.opacity='0';
  rulesEl.style.transform = dir==='exit-left' ? 'translateX(-20px)' : 'translateX(20px)';
  rulesEl.style.transition='opacity .2s ease, transform .2s ease';

  setTimeout(()=>{
    origSw(id);
    rulesEl.style.transform='translateX(0)';
    rulesEl.style.opacity='1';
    prevSectionIdx = curIdx;
    observeCards();
  }, 200);
};

/* ── 7. 헤더 야구장 마우스 시차 (parallax) ── */
const stadium = document.querySelector('.hdr-stadium');
document.addEventListener('mousemove', e=>{
  if(!stadium) return;
  const rect = stadium.getBoundingClientRect();
  const cx = window.innerWidth/2;
  const cy = rect.top+rect.height/2;
  const dx = (e.clientX-cx)/cx;         // -1 ~ 1
  const dy = (e.clientY-cy)/(window.innerHeight/2);
  stadium.style.transform=`perspective(800px) rotateX(${dy*-4}deg) rotateY(${dx*6}deg) scale(1.02)`;
});
document.querySelector('.hdr')?.addEventListener('mouseleave',()=>{
  if(stadium) stadium.style.transform='';
});

/* ── 8. 초기 카드 관찰 시작 ── */
setTimeout(observeCards, 100);
</script>
</body>
